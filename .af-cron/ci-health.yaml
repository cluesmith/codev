# CI Health Check — detects broken builds on main
#
# Checks every minute (for testing). Change to "*/30 * * * *" for production.

name: CI Health Check
schedule: "*/30 * * * *"
enabled: true
command: gh run list --branch main --limit 10 --json workflowName,conclusion --jq 'group_by(.workflowName) | map(.[0]) | map(select(.conclusion == "failure")) | map(.workflowName) | join(", ")'
condition: "output != ''"
message: "CI Alert: currently failing on main: ${output}. Run `gh run list --limit 5` to investigate."
target: architect
timeout: 30
